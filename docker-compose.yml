services:
  hermes:
    build: .
    image: hermes-agent
    container_name: hermes
    network_mode: host
    env_file:
      - .env
    environment:
      - HERMES_WEB_HOST=0.0.0.0
      - HERMES_WEB_PORT=9119
    volumes:
      - hermes-data:/root/.hermes
      - ./hermes_memory:/root/.hermes/memory
      - ./work:/opt/hermes/work
    ports:
      - "9119:9119"
    stdin_open: true
    tty: true
    command: hermes gateway run

volumes:
  hermes-data:
