services:
  hermes:
    build: .
    image: hermes-agent
    container_name: hermes
    network_mode: host
    env_file:
      - .env
    environment:
      - HERMES_WEB_HOST=0.0.0.0
      - HERMES_WEB_PORT=9119
    volumes:
      - ./data:/root/.hermes
      - ./projects:/root/projects
    stdin_open: true
    tty: true
    command: hermes gateway run
